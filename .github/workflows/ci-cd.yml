name: ci-cd-pipeline

on:
    push: 
        branches: [main]
    pull_request: 
        branches: [main]

jobs:
    build-test-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build image
              uses: docker/build-push-action@v7
              with:
                    push: false
                    secret-envs: |
                        "MONGO_URI=${{ secrets.MONGO_URI }}"
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:latest
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:${{ github.sha }}
            
            - name: Smoke test
              run: |
                docker run -d -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:latest
                sleep 5
                response=$(curl -s http://localhost:3000/api/health)
                if [[ "$response" == *"ok"* ]]; then
                    echo "Health check passed"
                else
                    echo "Health check failed"
                    exit 1
                fi
            
            - name: Push to Docker Hub
              uses: docker/build-push-action@v7
              if: github.event_name == 'push'
              with:
                    push: true
                    secret-envs: |
                        "MONGO_URI=${{ secrets.MONGO_URI }}"
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:latest
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:${{ github.sha }}
    
    deploy:
        runs-on: ubuntu-latest
        needs: build-test-push
        if: github.event_name == 'push'
        steps:
            - name: Deploy to production
              run: curl -X POST ${{ secrets.RENDER_DEPLOY_URL}}
