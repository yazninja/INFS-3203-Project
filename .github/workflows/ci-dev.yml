name: Development CI Pipeline

on:
    pull_request: 
        branches: [develop]

jobs:
    build-test-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build image
              uses: docker/build-push-action@v7
              with:
                    push: false
                    context: .
                    secret-files: |
                        DOTENV=./.env
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:dev
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:${{ github.sha }}
            
            - name: Smoke test
              run: |
                docker run -d -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:dev
                sleep 5
                response=$(curl -s http://localhost:3000/api/health)
                if [[ "$response" == *"ok"* ]]; then
                    echo "Health check passed"
                else
                    echo "Health check failed"
                    exit 1
                fi
            
            - name: Push to Docker Hub
              uses: docker/build-push-action@v7
              with:
                    push: true
                    context: .
                    secret-files: |
                        DOTENV=./.env
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:dev
                        ${{ secrets.DOCKERHUB_USERNAME }}/qatardrive:${{ github.sha }}
    
    deploy:
        runs-on: ubuntu-latest
        needs: build-test-push
        steps:
            - name: Deploy to production
              run: curl -X POST ${{ secrets.RENDER_DEVELOP_DEPLOY_URL}}
